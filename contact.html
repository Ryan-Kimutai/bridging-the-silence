<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Bridging the Silence Podcast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div id="navbar-placeholder"></div>
  </header>

  <main>
    <section class="page-header">
      <div class="section-inner">
        <p class="section-eyebrow light">Contact</p>
        <h1 class="section-heading light">Let's Talk.</h1>
        <p class="page-subtext">Questions, press, partnerships, or just want to say hi? <br>We read every message.</p>
      </div>
    </section>

    <section class="contact-section">
      <div class="section-inner">
        <form id="contact-form" class="form-card" action="https://formspree.io/f/mrewzzpn" method="POST" onsubmit="handleFormSubmit(event, 'contact-msg')">
          <input type="hidden" name="_subject" value="New message from Bridging the Silence website">
          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

          <div class="form-group">
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" name="name" required>
          </div>
          <div class="form-group">
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="email" required>
          </div>
          <div class="form-group">
            <label for="contact-reason">Reason for reaching out</label>
            <select id="contact-reason" name="reason">
              <option value="General">General inquiry</option>
              <option value="Press">Press / Media</option>
              <option value="Sponsorship">Sponsorship / Partnership</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" required></textarea>
          </div>

          <button type="submit" class="btn btn-amber">Send Message</button>
          <p id="contact-msg" class="form-note" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div id="footer-placeholder"></div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
