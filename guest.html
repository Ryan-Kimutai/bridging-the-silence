<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Be a Guest — Bridging the Silence Podcast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div id="navbar-placeholder"></div>
  </header>

  <main>
    <section class="page-header">
      <div class="section-inner">
        <p class="section-eyebrow light">Be a Guest</p>
        <h1 class="section-heading light">Have a Story<br>Worth Telling?</h1>
        <p class="page-subtext">We're always looking for honest voices — no perfect résumé required, just something real to say.</p>
      </div>
    </section>

    <section class="contact-section">
      <div class="section-inner">
        <form id="guest-form" class="form-card" action="https://formspree.io/f/xgojwwkr" method="POST" onsubmit="handleFormSubmit(event, 'guest-msg')">
          <input type="hidden" name="_subject" value="New guest application — Bridging the Silence">
          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

          <div class="form-group">
            <label for="guest-name">Name</label>
            <input type="text" id="guest-name" name="name" required>
          </div>
          <div class="form-group">
            <label for="guest-email">Email</label>
            <input type="email" id="guest-email" name="email" required>
          </div>
          <div class="form-group">
            <label for="guest-phone">Phone (optional)</label>
            <input type="tel" id="guest-phone" name="phone">
          </div>
          <div class="form-group">
            <label for="guest-story">What story or topic would you like to share?</label>
            <textarea id="guest-story" name="story" required></textarea>
          </div>
          <div class="form-group">
            <label for="guest-link">Social media or portfolio link (optional)</label>
            <input type="text" id="guest-link" name="link">
          </div>

          <button type="submit" class="btn btn-amber">Submit Application</button>
          <p id="guest-msg" class="form-note" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div id="footer-placeholder"></div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
